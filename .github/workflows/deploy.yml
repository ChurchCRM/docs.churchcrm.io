name: Deploy to GitHub Pages

# Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation warnings
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  # Also trigger when the CRM repo updates its OpenAPI specs
  repository_dispatch:
    types: [openapi-updated]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest OpenAPI specs from CRM repo
        run: |
          mkdir -p openapi
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/public-api.yaml" \
            -o openapi/public-api.yaml
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/private-api.yaml" \
            -o openapi/private-api.yaml
          echo "Downloaded specs:"
          wc -l openapi/*.yaml

      - name: Generate API docs from specs
        run: npm run regen

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      # `environment.url` cannot safely reference step outputs (evaluated before steps run).
      # The `actions/deploy-pages` step will set the Pages deployment URL; omit job-level url.
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
