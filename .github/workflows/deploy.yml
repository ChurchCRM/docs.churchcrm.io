name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  # Also trigger when the CRM repo updates its OpenAPI specs
  repository_dispatch:
    types: [openapi-updated]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest OpenAPI specs from CRM repo
        run: |
          mkdir -p openapi
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/public-api.yaml" \
            -o openapi/public-api.yaml
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/private-api.yaml" \
            -o openapi/private-api.yaml
          echo "Downloaded specs:"
          wc -l openapi/*.yaml

      - name: Generate API docs from specs
        run: npm run regen

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
