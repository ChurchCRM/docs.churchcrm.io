name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
  # Also trigger when the CRM repo updates its OpenAPI specs
  repository_dispatch:
    types: [openapi-updated]

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest OpenAPI specs from CRM repo
        run: |
          mkdir -p openapi
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/public-api.yaml" \
            -o openapi/public-api.yaml
          curl -fsSL \
            "https://raw.githubusercontent.com/ChurchCRM/CRM/master/openapi/private-api.yaml" \
            -o openapi/private-api.yaml
          echo "Downloaded specs:"
          wc -l openapi/*.yaml

      - name: Generate API docs from specs
        run: npm run regen

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: docs.churchcrm.io
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
